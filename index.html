<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Finder App</title>

  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  >
</head>

<body>

  <div class="container">

    <!-- Header -->
    <header>
      <h1>
        <i class="fas fa-utensils"></i> Recipe Finder
      </h1>
      <p>Find delicious recipes from around the world.</p>
    </header>

    <!-- API Link -->
    <p class="api-link">
      Data from
      <a href="https://www.themealdb.com/api.php" target="_blank">
        TheMealDB
      </a>
    </p>

    <!-- Search Section -->
    <div class="search-container">
      <input
        type="text"
        id="search-input"
        placeholder="Search for meals or keywords"
      >

      <button id="search-btn">
        <i class="fas fa-search"></i> Search
      </button>
    </div>

    <!-- Error Message -->
    <div id="error-container" class="hidden">
      <p>No meals found. Try another search term!</p>
    </div>

    <!-- Results -->
    <div id="result-heading"></div>

    <div id="meals" class="meals-container"></div>

    <!-- Meal Details -->
    <div id="meal-details" class="hidden">

      <button id="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Recipes
      </button>

      <div class="meal-details-content"></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
